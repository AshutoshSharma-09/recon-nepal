version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-backend
    ports:
      - "127.0.0.1:8001:8000" # Private backend (Nginx only)
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - API_KEYS=${API_KEYS}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES}
    volumes:
      - ./backend:/app # Hot Reloading: Mount code
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pms-frontend
    environment:
      - BACKEND_URL=http://backend:8000/api/:path*
    depends_on:
      - backend
    restart: unless-stopped
    # ❌ NO ports exposed

  nginx:
    image: nginx:1.25-alpine
    container_name: pms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: pms-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
