steps:
  # 1. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-backend:latest'
      - './backend'
    id: 'build-backend'

  # 2. Build Frontend Image (parallel with backend)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_FRONTEND_API_URL'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-frontend:latest'
      - './frontend'
    id: 'build-frontend'
    waitFor: ['-']

  # 3. Build Nginx Image (parallel with backend & frontend)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-nginx:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recon-nepal-nginx:latest'
      - './nginx'
    id: 'build-nginx'
    waitFor: ['-']

  # 4. Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-backend:$COMMIT_SHA']
    id: 'push-backend-sha'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-backend:latest']
    id: 'push-backend-latest'
    waitFor: ['build-backend']

  # 5. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-frontend:$COMMIT_SHA']
    id: 'push-frontend-sha'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-frontend:latest']
    id: 'push-frontend-latest'
    waitFor: ['build-frontend']

  # 6. Push Nginx Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-nginx:$COMMIT_SHA']
    id: 'push-nginx-sha'
    waitFor: ['build-nginx']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recon-nepal-nginx:latest']
    id: 'push-nginx-latest'
    waitFor: ['build-nginx']

  # --- Deployment Step (Compute Engine via SSH) ---
  # Uncomment and configure if deploying to a VM:
  # - name: 'gcr.io/cloud-builders/gcloud'
  #   entrypoint: 'bash'
  #   args:
  #     - '-c'
  #     - |
  #       gcloud compute ssh $_VM_NAME --zone $_ZONE --command "
  #         cd /path/to/project &&
  #         docker-compose pull &&
  #         docker-compose up -d
  #       "
  #   id: 'deploy-vm'
  #   waitFor: ['push-backend-latest', 'push-frontend-latest', 'push-nginx-latest']

images:
  - 'gcr.io/$PROJECT_ID/recon-nepal-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/recon-nepal-backend:latest'
  - 'gcr.io/$PROJECT_ID/recon-nepal-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/recon-nepal-frontend:latest'
  - 'gcr.io/$PROJECT_ID/recon-nepal-nginx:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/recon-nepal-nginx:latest'

substitutions:
  _FRONTEND_API_URL: '/api'
  # _VM_NAME: 'recon-nepal-instance'
  # _ZONE: 'us-central1-a'

options:
  logging: CLOUD_LOGGING_ONLY
