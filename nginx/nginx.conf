events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Upload optimization settings
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    server {
        listen 8080;

        # -----------------------------------------------------------------
        # Backend API — proxy to uvicorn running on localhost:8000
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload-specific optimizations
            proxy_request_buffering off;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Increased timeouts for file processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Backend Docs (Swagger UI)
        location /docs {
            proxy_pass http://127.0.0.1:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://127.0.0.1:8000/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------
        # Next.js static assets (hashed — long cache)
        # -----------------------------------------------------------------
        location /_next/static/ {
            alias /app/frontend/.next/static/;
            expires 365d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # -----------------------------------------------------------------
        # Public assets (favicon, images, etc.)
        # -----------------------------------------------------------------
        location /public/ {
            alias /app/frontend/public/;
            expires 30d;
            access_log off;
        }

        # -----------------------------------------------------------------
        # Frontend — serve pre-built Next.js via its standalone server
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
